      <text x="0" y="-75" font-size="11" fill="#9A3412" text-anchor="middle" font-style="italic">post-purchase</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">customer leaves email</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">seasonal nurture</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">customer re-engages</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">tree updates sent</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">cacao customers</text>
    </g>

    <!-- Loop 2: Partner Check-in -->
