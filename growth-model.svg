      <text x="0" y="-90" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Partner Check-in</text>
      <text x="0" y="-75" font-size="11" fill="#9A3412" text-anchor="middle" font-style="italic">concierge UX</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">DApp bell surfaces overdue</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">operator narrates</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">next date refreshed</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">LLM files signed event</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">retail partners</text>
    </g>

    <!-- Loop 3: DApp Bell -->
    <g transform="translate(1020, 180)">
      <text x="0" y="-90" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">DApp Bell</text>
      <text x="0" y="-75" font-size="11" fill="#9A3412" text-anchor="middle" font-style="italic">operator action queue</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">operator opens DApp</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">bell shows items</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">queue clears, refreshes</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">operator acts</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">operators</text>
    </g>

    <!-- Row 2: 3 loops -->
    <!-- Loop 4: Beer Hall Digest (positioned in second row) -->
    <g transform="translate(220, 320)">
      <text x="0" y="-58" font-size="11" font-weight="700" fill="#9A3412" text-anchor="middle">Beer Hall Digest</text>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#F97316" stroke-width="6" opacity="0.85"/>
      <text x="-32" y="-30" font-size="9" fill="#475569" text-anchor="middle">daily DAO state</text>
      <text x="36" y="-30" font-size="9" fill="#475569" text-anchor="middle">→ contributor reads</text>
      <text x="-32" y="42" font-size="9" fill="#475569" text-anchor="middle">→ work surfaces</text>
      <text x="36" y="42" font-size="9" fill="#475569" text-anchor="middle">→ contributes</text>
      <text x="0" y="62" font-size="9" fill="#94A3B8" text-anchor="middle" font-style="italic">contributors</text>
    </g>

    <!-- Loop 5: Credentialing Lineage -->
    <g transform="translate(620, 320)">
      <text x="0" y="-58" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">Credentialing Lineage</text>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#22C55E" stroke-width="6" opacity="0.85"/>
      <text x="-32" y="-30" font-size="9" fill="#475569" text-anchor="middle">initial credential</text>
      <text x="36" y="-30" font-size="9" fill="#475569" text-anchor="middle">→ continues practice</text>
      <text x="-32" y="42" font-size="9" fill="#475569" text-anchor="middle">→ identity ownership</text>
      <text x="36" y="42" font-size="9" fill="#475569" text-anchor="middle">→ deeper attestations</text>
      <text x="0" y="62" font-size="9" fill="#94A3B8" text-anchor="middle" font-style="italic">students · contributors</text>
    </g>

    <!-- Loop 6: Trees Dashboard -->
    <g transform="translate(1020, 320)">
      <text x="0" y="-58" font-size="11" font-weight="700" fill="#9A3412" text-anchor="middle">Trees Dashboard</text>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#F97316" stroke-width="6" opacity="0.85" stroke-dasharray="3,3"/>
      <text x="-32" y="-30" font-size="9" fill="#475569" text-anchor="middle">customer revisits</text>
      <text x="36" y="-30" font-size="9" fill="#475569" text-anchor="middle">→ tree at month N</text>
      <text x="-32" y="42" font-size="9" fill="#475569" text-anchor="middle">→ engages</text>
      <text x="36" y="42" font-size="9" fill="#475569" text-anchor="middle">→ re-purchases</text>
      <text x="0" y="62" font-size="9" fill="#94A3B8" text-anchor="middle" font-style="italic">cacao customers (underexploited)</text>
    </g>

    <!-- Compounding feedback arrow -->
    <path d="M 1100 60 Q 1240 100 1250 80 L 1260 30" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
    <text x="1100" y="75" font-size="11" fill="#A78BFA" opacity="0.85" font-style="italic">retention compounds back to acquisition</text>
  </g>
</svg>
