      <text x="0" y="-75" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Trace-Back</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">customer buys cacao</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">scans QR · sees tree</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">friend buys</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">shares with friend</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">cacao customers</text>
    </g>

    <!-- Loop 3: Contributor → Contributor -->
    <g transform="translate(620, 180)">
      <text x="0" y="-90" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Contributor →</text>
      <text x="0" y="-75" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Contributor</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">existing contributor</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">attested work shown</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">new contributor active</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">brings new contributor</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">DAO contributors</text>
    </g>

    <!-- Loop 4: B2B Sales -->
    <g transform="translate(870, 180)">
      <text x="0" y="-90" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">B2B Sales</text>
      <text x="0" y="-75" font-size="11" fill="#9A3412" text-anchor="middle" font-style="italic">Email360 + krake_sinatra</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">warm-up queue</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">prospect replies</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">first restock · cycle</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">partner onboarded</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">retail partners</text>
    </g>

    <!-- Loop 5: Compassionate Action Attestation -->
    <g transform="translate(1110, 180)">
      <text x="0" y="-90" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">Compassionate</text>
      <text x="0" y="-75" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">Action Attestation</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#22C55E" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">student performs act</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">attestor signs</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">others discover DAO</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">credential shared</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">students · contributors</text>
    </g>

    <!-- Inter-band arrow -->
    <line x1="640" y1="318" x2="640" y2="338" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- ============== RETENTION LOOPS BAND ============== -->
