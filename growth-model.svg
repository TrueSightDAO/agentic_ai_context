<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1080" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-cycle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="1080" fill="#FFFFFF"/>

  <!-- ============== NORTH STAR BANNER ============== -->
  <rect x="20" y="20" width="1240" height="62" rx="8" fill="#0F172A"/>
  <text x="40" y="48" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="2">NORTH STAR</text>
  <text x="40" y="70" font-size="18" font-weight="600" fill="#FFFFFF">Trees financed / month</text>
  <text x="280" y="70" font-size="18" fill="#64748B">→</text>
  <text x="305" y="70" font-size="18" font-weight="500" fill="#A78BFA">Verifiable compassionate actions attested / month</text>
  <text x="1240" y="48" font-size="11" fill="#94A3B8" text-anchor="end" letter-spacing="1">TRUESIGHT DAO</text>
  <text x="1240" y="70" font-size="11" fill="#64748B" text-anchor="end">growth model · 2026-05-19</text>

  <!-- ============== LEGEND ============== -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#F97316"/>
    <text x="22" y="12" font-size="12" fill="#334155">Active</text>
    <rect x="80" y="0" width="14" height="14" rx="2" fill="#22C55E"/>
    <text x="102" y="12" font-size="12" fill="#334155">Being Built</text>
    <rect x="190" y="0" width="14" height="14" rx="2" fill="#CBD5E1"/>
    <text x="212" y="12" font-size="12" fill="#334155">To Be Built</text>
    <rect x="298" y="0" width="14" height="14" rx="2" fill="#EF4444"/>
    <text x="320" y="12" font-size="12" fill="#334155">Wrote Off</text>
  </g>

  <!-- ============== LINEAR CHANNELS BAND ============== -->
  <g transform="translate(0, 140)">
    <rect x="20" y="0" width="1240" height="170" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="40" y="28" font-size="12" font-weight="700" fill="#64748B" letter-spacing="2">LINEAR CHANNELS</text>
    <text x="40" y="46" font-size="13" fill="#475569">How we get more partners, customers, contributors</text>

    <g transform="translate(40, 64)">
      <g>
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#F97316" opacity="0.92"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Direct Marketing</text>
        <text x="70" y="46" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Email360 warm-up</text>
        <text x="70" y="63" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.75">+ personal driving</text>
        <line x1="70" y1="84" x2="70" y2="98" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
      </g>
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#22C55E" opacity="0.92"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Marketplace</text>
        <text x="70" y="44" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.95">Faire</text>
        <text x="70" y="60" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.75">(Etsy ✗  Amazon ✗)</text>
        <line x1="70" y1="84" x2="70" y2="98" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
      </g>
      <g transform="translate(300, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#F97316" opacity="0.92"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Content Marketing</text>
        <text x="70" y="46" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.9">truesight.me</text>
        <text x="70" y="62" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.75">Beer Hall · blog</text>
        <line x1="70" y1="84" x2="70" y2="98" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
      </g>
      <g transform="translate(450, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#F97316" opacity="0.92"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">QR Traceback</text>
        <text x="70" y="46" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Each bag</text>
        <text x="70" y="62" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.75">→ tree page</text>
        <line x1="70" y1="84" x2="70" y2="98" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
      </g>
      <g transform="translate(600, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#22C55E" opacity="0.92"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Programs</text>
        <text x="70" y="46" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.9">BE · capoeira</text>
        <text x="70" y="62" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.75">Vipassana · …</text>
        <line x1="70" y1="84" x2="70" y2="98" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
      </g>
      <g transform="translate(750, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#CBD5E1"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">SEM / Paid</text>
        <text x="70" y="46" font-size="11" fill="#64748B" text-anchor="middle">Not pursued</text>
        <text x="70" y="62" font-size="10" fill="#94A3B8" text-anchor="middle">(brand discipline)</text>
      </g>
      <g transform="translate(900, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#CBD5E1"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Speaking</text>
        <text x="70" y="46" font-size="11" fill="#64748B" text-anchor="middle">Podcasts</text>
        <text x="70" y="62" font-size="10" fill="#94A3B8" text-anchor="middle">untapped</text>
      </g>
      <g transform="translate(1050, 0)">
        <rect x="0" y="0" width="140" height="80" rx="6" fill="#CBD5E1"/>
        <text x="70" y="28" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Industry</text>
        <text x="70" y="46" font-size="11" fill="#64748B" text-anchor="middle">Associations</text>
        <text x="70" y="62" font-size="10" fill="#94A3B8" text-anchor="middle">hackathons</text>
      </g>
    </g>
  </g>

  <!-- ============== ACQUISITION LOOPS BAND ============== -->
  <g transform="translate(0, 340)">
    <rect x="20" y="0" width="1240" height="320" rx="10" fill="#FEF3E2" stroke="#FCD9B6"/>
    <text x="40" y="28" font-size="12" font-weight="700" fill="#92400E" letter-spacing="2">ACQUISITION LOOPS</text>
    <text x="40" y="46" font-size="13" fill="#7C2D12">How we get users to bring in more users</text>

    <!-- Loop 1: Retail Partner Referral -->
    <g transform="translate(140, 180)">
      <text x="0" y="-90" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Retail Partner</text>
      <text x="0" y="-75" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">Referral</text>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
      <text x="0" y="-58" font-size="10" fill="#475569" text-anchor="middle">existing partner</text>
      <text x="58" y="3" font-size="10" fill="#475569" text-anchor="start">mentions nearby</text>
      <text x="0" y="68" font-size="10" fill="#475569" text-anchor="middle">new partner onboarded</text>
      <text x="-58" y="3" font-size="10" fill="#475569" text-anchor="end">Gary follows up</text>
      <text x="0" y="92" font-size="10" fill="#94A3B8" text-anchor="middle" font-style="italic">retail partners</text>
    </g>

    <!-- Loop 2: QR Trace-Back -->
